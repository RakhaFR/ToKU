<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <!-- Background: TRANSPARAN -->
  
  <!-- ILUSTRASI UTAMA (KIRI) -->
  <g transform="translate(190, 190)">
    <!-- Bayangan Lantai Solid (Bukan Blur) -->
    <polygon points="-120,40 20,-20 140,30 0,90" fill="#cbd5e1" opacity="0.5" />
    
    <!-- Platform Device Utama (Base Layer) -->
    <polygon points="-100,20 40,-40 120,0 -20,60" fill="#64748b" />
    <polygon points="-100,10 40,-50 120,-10 -20,50" fill="#1e293b" />
    
    <!-- Layar Gadget / Interface (Top Layer) -->
    <polygon points="-90,10 35,-45 110,-10 -15,45" fill="#3b82f6" />
    
    <!-- Aksen Bar Grafik Minimalis di Atas Layar -->
    <polygon points="-40,10 -10,-5 -15,-2 -45,13" fill="#60a5fa" />
    <polygon points="0,-10 40,-30 45,-26 5,-6" fill="#34d399" />
    <polygon points="15,-17 30,-25 33,-22 18,-14" fill="#fbbf24" />
    
    <!-- Elemen Melayang Elegan (Kartu Diskon Isometrik) -->
    <g transform="translate(20, -50)">
      <!-- Ketebalan Kartu -->
      <polygon points="-40,10 20,-20 60,0 0,30" fill="#e11d48" />
      <polygon points="-40,5 20,-25 60,-5 0,25" fill="#f43f5e" />
      <!-- Garis Teks di Kartu -->
      <line x1="-10" y1="5" x2="20" y2="-10" stroke="#ffffff" stroke-width="4" stroke-linecap="round" />
    </g>
  </g>

  <!-- TEKS & KONTEN (KANAN) -->
  <g transform="translate(440, 140)">
    <!-- Tag Kategori -->
    <rect x="0" y="0" width="100" height="24" rx="4" fill="#eff6ff" />
    <text x="50" y="16" fill="#1e40af" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" letter-spacing="0.5">GADGET</text>

    <!-- Headline -->
    <text x="0" y="65" fill="#1e293b" font-family="'Segoe UI', system-ui, sans-serif" font-size="42" font-weight="800" letter-spacing="-0.5">Premium Tech</text>
    <text x="0" y="105" fill="#475569" font-family="'Segoe UI', system-ui, sans-serif" font-size="18" font-weight="400">Upgrade perangkatmu dengan penawaran terbaik.</text>
    
    <!-- CTA Button -->
    <g transform="translate(0, 150)" cursor="pointer">
      <rect x="0" y="0" width="150" height="42" rx="6" fill="#1e293b" />
      <text x="75" y="25" fill="#ffffff" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="600" text-anchor="middle">Jelajahi <tspan dx="3">→</tspan></text>
    </g>
  </g>
</svg>
