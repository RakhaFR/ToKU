<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 450" width="100%" height="100%">
  <!-- Pola Lingkaran Abstrak di Belakang Objek -->
  <circle cx="880" cy="225" r="160" fill="#f8fafc" />
  <circle cx="880" cy="225" r="120" fill="none" stroke="#f43f5e" stroke-width="3" stroke-dasharray="8 6" opacity="0.3" />

  <!-- GRAFIS UTAMA (SISI KANAN) -->
  <g transform="translate(800, 150)">
    <!-- Bayangan Belakang Balok -->
    <rect x="20" y="20" width="220" height="160" fill="#0f172a" rx="12" />
    <!-- Balok Kontainer Diskon Utama -->
    <rect x="0" y="0" width="220" height="160" fill="#f43f5e" stroke="#0f172a" stroke-width="5" rx="12" />
    
    <!-- Pola Garis Khas Pop Art di Dalam Balok -->
    <line x1="30" y1="160" x2="190" y2="0" stroke="#e11d48" stroke-width="12" />
    <line x1="70" y1="160" x2="220" y2="10" stroke="#e11d48" stroke-width="12" />
    
    <!-- Pita Gantung Retail Dinamis (Floating Ribbon) -->
    <g transform="translate(-40, 40) rotate(-12)">
      <rect x="0" y="0" width="140" height="36" fill="#eab308" stroke="#0f172a" stroke-width="4" rx="4" />
      <line x1="20" y1="18" x2="60" y2="18" stroke="#0f172a" stroke-width="6" stroke-linecap="round" />
      <line x1="80" y1="18" x2="110" y2="18" stroke="#0f172a" stroke-width="6" stroke-linecap="round" />
    </g>

    <!-- Kantong Belanja Flat 3D Kecil -->
    <g transform="translate(180, 110) rotate(15)">
      <rect x="0" y="0" width="70" height="80" fill="#34d399" stroke="#0f172a" stroke-width="4" rx="6" />
      <path d="M15,0 C15,-15 55,-15 55,0" fill="none" stroke="#0f172a" stroke-width="4" />
    </g>
  </g>
</svg>
